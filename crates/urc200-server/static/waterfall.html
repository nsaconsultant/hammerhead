<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#000000">
<title>HammerHead Waterfall</title>
<style>
  :root {
    --bg:       #000;
    --panel:    #0b1014;
    --fg:       #d4ae4a;
    --accent:   #ffb300;
    --muted:    #6c7177;
    --line:     #222b33;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
               font-family: ui-monospace, "SF Mono", Consolas, monospace;
               height: 100%; overflow: hidden; }
  #toolbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 6px 10px; background: rgba(11,16,20,0.9); backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--line);
    font-size: 12px;
  }
  #toolbar .title { color: var(--accent); font-weight: 700; letter-spacing: 0.1em; }
  #toolbar .kv { color: var(--muted); }
  #toolbar .kv b { color: var(--fg); font-weight: 400; }
  #toolbar input[type="number"], #toolbar select {
    background: var(--panel); color: var(--fg); border: 1px solid var(--line);
    border-radius: 3px; padding: 3px 6px; font-family: inherit; font-size: 12px;
    width: 120px;
  }
  #toolbar label { color: var(--muted); }
  #toolbar button {
    background: var(--panel); color: var(--fg); border: 1px solid var(--line);
    border-radius: 3px; padding: 3px 10px; font-family: inherit; font-size: 12px;
    cursor: pointer;
  }
  #toolbar button:hover { border-color: var(--accent); }
  #toolbar .dot { width: 8px; height: 8px; border-radius: 50%; background: #2a2f35; }
  #toolbar .dot.ok { background: #5ad364; box-shadow: 0 0 5px #5ad364; }
  #toolbar .dot.bad { background: #e54848; }
  #toolbar .spacer { flex: 1; }

  /* Stack: live spectrum row up top, frequency ruler strip, scrolling
     waterfall below. The `top` of #wrap is set dynamically in JS so a
     flex-wrapped toolbar (extra controls on narrow screens) doesn't
     overlap the spectrum. */
  #wrap { position: absolute; left: 0; right: 0; bottom: 0; }
  #spec  { position: absolute; top: 0;   left: 0; width: 100%; height: 120px;
           background: #050505; border-bottom: 1px solid var(--line); }
  #ruler { position: absolute; top: 120px; left: 0; width: 100%; height: 40px;
           background: #0a0f14; border-bottom: 1px solid var(--line); }
  #wf    { position: absolute; top: 160px; left: 0; right: 0; bottom: 0;
           width: 100%; image-rendering: pixelated; }
  #cursor { position: absolute; top: 0; bottom: 0; width: 1px;
            background: rgba(255,179,0,0.55); pointer-events: none; display: none; }
  #cursor-label { position: absolute; top: 0; background: rgba(0,0,0,0.7);
                  color: var(--accent); font-size: 10px; padding: 2px 4px;
                  border-radius: 2px; pointer-events: none; display: none;
                  white-space: nowrap; }
  #empty {
    position: absolute; inset: 34px 0 0 0; display: flex;
    align-items: center; justify-content: center; color: var(--muted);
    font-size: 14px; pointer-events: none;
  }
</style>
</head>
<body>
  <div id="toolbar">
    <span class="title">HAMMERHEAD WATERFALL</span>
    <span class="dot" id="ws-dot"></span><span id="ws-state">disconnected</span>
    <span class="kv">center <b id="t-center">—</b> MHz</span>
    <span class="kv">span <b id="t-span">—</b> kHz</span>
    <span class="kv">fps <b id="t-fps">—</b></span>
    <span class="spacer"></span>
    <label>MHz
      <input type="number" id="tune-input" step="0.005" placeholder="e.g. 251.950">
    </label>
    <button id="tune-btn" title="Tune the URC-200 radio (RX = TX)">Tune radio</button>
    <button id="sdr-center-btn" title="Recenter the SDR window on this frequency">SDR ⟲</button>
    <button id="sdr-follow-btn" title="Recenter the SDR on the URC-200's current RX frequency">SDR → radio</button>
    <label>zoom
      <select id="zoom-sel" style="width:80px">
        <option value="1">1× (full)</option>
        <option value="2">2×</option>
        <option value="4">4×</option>
        <option value="8">8×</option>
        <option value="16">16×</option>
        <option value="32">32×</option>
      </select>
    </label>
    <label>gain
      <select id="gain-sel" style="width:80px">
        <option value="auto">auto</option>
        <option value="30">30 dB</option>
        <option value="40">40 dB</option>
        <option value="50">50 dB</option>
        <option value="60">60 dB</option>
      </select>
    </label>
  </div>

  <div id="wrap">
    <canvas id="spec"></canvas>
    <canvas id="ruler"></canvas>
    <canvas id="wf"></canvas>
    <div id="cursor"></div>
    <div id="cursor-label"></div>
    <div id="empty">waiting for SDR frames…</div>
  </div>

<script>
(() => {
  const wsDot = document.getElementById("ws-dot");
  const wsState = document.getElementById("ws-state");
  const tCenter = document.getElementById("t-center");
  const tSpan = document.getElementById("t-span");
  const tFps = document.getElementById("t-fps");
  const tuneInput = document.getElementById("tune-input");
  const tuneBtn = document.getElementById("tune-btn");
  const gainSel = document.getElementById("gain-sel");
  const zoomSel = document.getElementById("zoom-sel");
  const empty = document.getElementById("empty");
  const spec = document.getElementById("spec");
  const ruler = document.getElementById("ruler");
  const wf = document.getElementById("wf");
  const cursor = document.getElementById("cursor");
  const cursorLabel = document.getElementById("cursor-label");
  const sctx = spec.getContext("2d");
  const rctx = ruler.getContext("2d");
  const wctx = wf.getContext("2d");

  // Offscreen scroll buffer so the waterfall can shift-and-draw cheaply.
  const scratch = document.createElement("canvas");
  const xctx = scratch.getContext("2d");

  let ws = null;        // waterfall (binary FFT)
  let telWs = null;     // telemetry (URC-200 state) — used only for the marker
  let state = {
    center_hz: 0,
    sample_rate: 0,
    fft_size: 0,
    zoom: 1, // display-side zoom factor; 1 = full span, 2 = center 50%, etc.
    radio_rx_hz: 0, // URC-200 current RX, for the tuned-frequency marker
    frameCount: 0,
    fpsWindowAt: performance.now(),
  };

  // Compute the visible [low, high] Hz bounds of the current zoom window.
  function visibleRange() {
    if (!state.sample_rate || !state.center_hz) return null;
    const visSpan = state.sample_rate / state.zoom;
    return {
      low:  state.center_hz - visSpan / 2,
      high: state.center_hz + visSpan / 2,
      span: visSpan,
    };
  }

  // Iron palette — dark → red → yellow → white. Used by both the spectrum
  // fill and the waterfall.
  const palette = (() => {
    const p = new Uint8ClampedArray(256 * 4);
    for (let i = 0; i < 256; i++) {
      const t = i / 255;
      let r, g, b;
      if (t < 0.1) {
        const u = t / 0.1;
        r = 5; g = 0 + 10*u; b = 10 + 40*u;
      } else if (t < 0.4) {
        const u = (t - 0.1) / 0.3;
        r = 5 + 180*u; g = 10 + 30*u; b = 50 - 40*u;
      } else if (t < 0.75) {
        const u = (t - 0.4) / 0.35;
        r = 185 + 70*u; g = 40 + 180*u; b = 10;
      } else {
        const u = (t - 0.75) / 0.25;
        r = 255; g = 220 + 35*u; b = 10 + 240*u;
      }
      p[i*4+0] = r; p[i*4+1] = g; p[i*4+2] = b; p[i*4+3] = 255;
    }
    return p;
  })();

  function resize() {
    // Toolbar can wrap onto 2+ rows on narrow screens; measure it each resize
    // so the spectrum doesn't slide under the title bar.
    const toolbar = document.getElementById("toolbar");
    const wrap = document.getElementById("wrap");
    const topOffset = toolbar ? toolbar.offsetHeight : 34;
    if (wrap) wrap.style.top = `${topOffset}px`;
    const w = wf.clientWidth, hTop = spec.clientHeight, hBot = wf.clientHeight, hRul = ruler.clientHeight;
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    spec.width  = Math.round(w * dpr);
    spec.height = Math.round(hTop * dpr);
    ruler.width = Math.round(w * dpr);
    ruler.height = Math.round(hRul * dpr);
    wf.width    = Math.round(w * dpr);
    wf.height   = Math.round(hBot * dpr);
    scratch.width = wf.width;
    scratch.height = wf.height;
    sctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    rctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    wctx.setTransform(1, 0, 0, 1, 0, 0); // pixel space for blit
    wctx.fillStyle = "#000"; wctx.fillRect(0, 0, wf.width, wf.height);
    drawRuler();
  }
  window.addEventListener("resize", resize);

  // Pick a "nice" tick spacing in Hz given a visible span in Hz. Always one of
  // {1, 2, 5} × 10^k so labels land on readable values.
  // US/ITU-R2 band plan — flattened to a list of non-overlapping spans for
  // ruler labeling. Each entry is {lo, hi, name, color}. Names and colors
  // are tuned for at-a-glance recognition, not regulatory completeness.
  //
  // Source mix: FCC allocation table + ARRL band plan + common mil/fed
  // assignments (UHF SATCOM, MILAIR, etc.). When a regulatory band and a
  // practical-usage label conflict we prefer the usage label (e.g.
  // "UHF SATCOM DL" inside the broader 225-400 MHz mil UHF allocation).
  const BANDS = [
    // HF ham (the big contest bands only — the rest is noise on a waterfall)
    { lo:   1_800_000, hi:   2_000_000, name: "160m Ham",     color: "#2d5" },
    { lo:   3_500_000, hi:   4_000_000, name: "80m Ham",      color: "#2d5" },
    { lo:   5_330_500, hi:   5_406_400, name: "60m Ham",      color: "#2d5" },
    { lo:   7_000_000, hi:   7_300_000, name: "40m Ham",      color: "#2d5" },
    { lo:  10_100_000, hi:  10_150_000, name: "30m Ham",      color: "#2d5" },
    { lo:  14_000_000, hi:  14_350_000, name: "20m Ham",      color: "#2d5" },
    { lo:  18_068_000, hi:  18_168_000, name: "17m Ham",      color: "#2d5" },
    { lo:  21_000_000, hi:  21_450_000, name: "15m Ham",      color: "#2d5" },
    { lo:  24_890_000, hi:  24_990_000, name: "12m Ham",      color: "#2d5" },
    { lo:  26_965_000, hi:  27_405_000, name: "CB",           color: "#a64" },
    { lo:  28_000_000, hi:  29_700_000, name: "10m Ham",      color: "#2d5" },
    // Low VHF
    { lo:  30_000_000, hi:  50_000_000, name: "Low VHF Fed/PS", color: "#76a" },
    { lo:  50_000_000, hi:  54_000_000, name: "6m Ham",      color: "#2d5" },
    { lo:  54_000_000, hi:  72_000_000, name: "VHF TV 2-4",  color: "#567" },
    { lo:  72_000_000, hi:  76_000_000, name: "Fed/R-C",     color: "#76a" },
    { lo:  76_000_000, hi:  88_000_000, name: "VHF TV 5-6",  color: "#567" },
    { lo:  88_000_000, hi: 108_000_000, name: "FM Broadcast",color: "#a85" },
    // Aviation / VHF-air
    { lo: 108_000_000, hi: 117_975_000, name: "Aero Nav (VOR/ILS)", color: "#58a" },
    { lo: 117_975_000, hi: 137_000_000, name: "Civil Air (AM)",     color: "#39c" },
    { lo: 137_000_000, hi: 138_000_000, name: "Wx/Met Sat",         color: "#58a" },
    { lo: 138_000_000, hi: 144_000_000, name: "Fed/Mil VHF",        color: "#a37" },
    { lo: 144_000_000, hi: 148_000_000, name: "2m Ham",             color: "#2d5" },
    { lo: 148_000_000, hi: 150_800_000, name: "Fed/Mil VHF",        color: "#a37" },
    { lo: 150_800_000, hi: 156_000_000, name: "VHF LMR/PS",         color: "#76a" },
    { lo: 156_000_000, hi: 162_025_000, name: "Marine VHF",         color: "#27a" },
    { lo: 162_400_000, hi: 162_550_000, name: "NOAA Weather",       color: "#48c" },
    { lo: 162_025_000, hi: 174_000_000, name: "Fed/LMR VHF",        color: "#76a" },
    { lo: 174_000_000, hi: 216_000_000, name: "VHF TV 7-13",        color: "#567" },
    { lo: 216_000_000, hi: 225_000_000, name: "Fed/AMTS",           color: "#567" },
    // UHF military / SATCOM
    { lo: 225_000_000, hi: 240_000_000, name: "UHF Mil AM",         color: "#a37" },
    { lo: 240_000_000, hi: 270_000_000, name: "UHF SATCOM DL",      color: "#c39" },
    { lo: 270_000_000, hi: 292_000_000, name: "UHF Mil",            color: "#a37" },
    { lo: 292_000_000, hi: 318_000_000, name: "UHF SATCOM UL",      color: "#c39" },
    { lo: 318_000_000, hi: 328_600_000, name: "UHF Mil",            color: "#a37" },
    { lo: 328_600_000, hi: 335_400_000, name: "Aero Nav (ILS GP)",  color: "#58a" },
    { lo: 335_400_000, hi: 399_900_000, name: "UHF Mil",            color: "#a37" },
    { lo: 399_900_000, hi: 406_000_000, name: "MSS / Std-Freq",     color: "#48c" },
    { lo: 406_000_000, hi: 420_000_000, name: "Fed UHF",            color: "#76a" },
    { lo: 420_000_000, hi: 450_000_000, name: "70cm Ham",           color: "#2d5" },
    { lo: 450_000_000, hi: 470_000_000, name: "UHF LMR/PS",         color: "#76a" },
    { lo: 470_000_000, hi: 608_000_000, name: "UHF TV",             color: "#567" },
    { lo: 608_000_000, hi: 614_000_000, name: "Radio Astronomy",    color: "#345" },
    { lo: 614_000_000, hi: 698_000_000, name: "UHF TV",             color: "#567" },
    { lo: 698_000_000, hi: 806_000_000, name: "700 MHz LTE/PS",     color: "#76a" },
    { lo: 806_000_000, hi: 824_000_000, name: "800 MHz PS/Trunked", color: "#76a" },
    { lo: 824_000_000, hi: 894_000_000, name: "Cellular",           color: "#93a" },
    { lo: 902_000_000, hi: 928_000_000, name: "33cm Ham / ISM",     color: "#2d5" },
    { lo: 960_000_000, hi:1_215_000_000, name: "Aero Radionav",     color: "#58a" },
    { lo:1_240_000_000, hi:1_300_000_000, name: "23cm Ham",         color: "#2d5" },
    { lo:1_525_000_000, hi:1_660_500_000, name: "MSS L-band",       color: "#48c" },
    { lo:2_400_000_000, hi:2_483_500_000, name: "13cm Ham / WiFi",  color: "#2d5" },
  ];

  function niceStep(spanHz, approxTicks) {
    const raw = spanHz / approxTicks;
    const pow10 = Math.pow(10, Math.floor(Math.log10(raw)));
    const m = raw / pow10;
    let step;
    if (m < 1.5) step = 1;
    else if (m < 3.5) step = 2;
    else if (m < 7.5) step = 5;
    else step = 10;
    return step * pow10;
  }

  function formatHz(hz) {
    // Pick enough decimals for the current tick spacing.
    const mhz = hz / 1e6;
    if (Math.abs(mhz) >= 100) return mhz.toFixed(3);
    if (Math.abs(mhz) >= 10) return mhz.toFixed(4);
    return mhz.toFixed(5);
  }

  // Ruler layout: total height 40 px, split into a ticks zone on top and a
  // band-strip zone on the bottom.
  const RULER_TICKS_H = 22;
  const RULER_BANDS_H = 18;

  function drawRuler() {
    const W = ruler.clientWidth, H = ruler.clientHeight;
    rctx.fillStyle = "#0a0f14"; rctx.fillRect(0, 0, W, H);
    const v = visibleRange();
    if (!v) return;

    // Gridline above the ruler + a dark baseline at the bottom.
    rctx.strokeStyle = "#222b33"; rctx.lineWidth = 1;
    rctx.beginPath(); rctx.moveTo(0, 0); rctx.lineTo(W, 0); rctx.stroke();

    const step = niceStep(v.span, W / 90); // ~90 px per label
    const first = Math.ceil(v.low / step) * step;
    rctx.font = "10px ui-monospace, Consolas, monospace";
    rctx.textAlign = "center";
    rctx.textBaseline = "top";

    for (let hz = first; hz <= v.high; hz += step) {
      const x = ((hz - v.low) / v.span) * W;
      rctx.strokeStyle = "#3d4852";
      rctx.beginPath(); rctx.moveTo(x, 0); rctx.lineTo(x, 6); rctx.stroke();
      rctx.fillStyle = "#a49470";
      rctx.fillText(`${formatHz(hz)}`, x, 7);
    }

    // Minor ticks — 5 between majors.
    rctx.strokeStyle = "#1d2530";
    const minor = step / 5;
    const mFirst = Math.ceil(v.low / minor) * minor;
    for (let hz = mFirst; hz <= v.high; hz += minor) {
      const x = ((hz - v.low) / v.span) * W;
      rctx.beginPath(); rctx.moveTo(x, 0); rctx.lineTo(x, 3); rctx.stroke();
    }

    // Band strip (FCC/ITU-R2 allocation labels). Each band that intersects
    // the visible range is drawn as a translucent colored span across the
    // strip, with the name inlaid when there's enough pixel width for it.
    const stripY = RULER_TICKS_H;
    const stripH = RULER_BANDS_H;
    rctx.fillStyle = "#05080b";
    rctx.fillRect(0, stripY, W, stripH);

    for (const b of BANDS) {
      if (b.hi <= v.low || b.lo >= v.high) continue;
      const x0 = Math.max(0, ((b.lo - v.low) / v.span) * W);
      const x1 = Math.min(W, ((b.hi - v.low) / v.span) * W);
      const w = x1 - x0;
      if (w < 1) continue;

      // Translucent fill for readability — ~28% alpha on the band color so
      // the tick grid can show through and labels stay legible.
      rctx.fillStyle = b.color + "48";
      rctx.fillRect(x0, stripY, w, stripH);

      // Thin solid color edge top + side separators.
      rctx.fillStyle = b.color;
      rctx.fillRect(x0, stripY, w, 2);

      // Inlay the name if the span is wide enough. Budget ~6 px per char
      // plus 8 px padding; otherwise leave the strip unlabeled.
      const budget = Math.max(0, w - 8);
      if (budget >= b.name.length * 5.6) {
        rctx.fillStyle = "#fff";
        rctx.font = "10px ui-monospace, Consolas, monospace";
        rctx.textAlign = "center";
        rctx.textBaseline = "middle";
        rctx.fillText(b.name, x0 + w / 2, stripY + 2 + (stripH - 2) / 2);
      }
    }

    // SDR center crosshair — dim, since it's the window, not the receiver.
    if (v.low <= state.center_hz && state.center_hz <= v.high) {
      const x = ((state.center_hz - v.low) / v.span) * W;
      rctx.strokeStyle = "rgba(212,174,74,0.4)";
      rctx.beginPath(); rctx.moveTo(x, 0); rctx.lineTo(x, H); rctx.stroke();
    }
  }

  // Draw the URC-200 tuned-frequency marker as a bright vertical line that
  // crosses the spectrum row + waterfall. Re-rendered every frame because
  // the waterfall scroll clobbers it otherwise.
  function drawRadioMarker() {
    const v = visibleRange();
    if (!v || !state.radio_rx_hz) return;
    if (state.radio_rx_hz < v.low || state.radio_rx_hz > v.high) return;
    const W = spec.clientWidth;
    const frac = (state.radio_rx_hz - v.low) / v.span;
    const x = frac * W;

    sctx.strokeStyle = "rgba(90,211,100,0.85)";
    sctx.lineWidth = 1;
    sctx.beginPath(); sctx.moveTo(x, 0); sctx.lineTo(x, spec.clientHeight); sctx.stroke();

    sctx.fillStyle = "rgba(90,211,100,0.95)";
    sctx.font = "10px ui-monospace, Consolas, monospace";
    sctx.textBaseline = "top";
    sctx.textAlign = frac > 0.88 ? "right" : "left";
    const lx = frac > 0.88 ? x - 4 : x + 4;
    sctx.fillText(`◆ URC-200  ${formatHz(state.radio_rx_hz)} MHz`, lx, 4);
  }

  function drawFrame(bins, centerHz, sampleRate) {
    const n = bins.length;
    if (n === 0) return;
    const W = spec.clientWidth, H = spec.clientHeight;

    // Slice to zoom window. Full span = fft_size bins covering sampleRate Hz
    // centered on centerHz; zoom=N shows the middle 1/N slice.
    const zoom = Math.max(1, state.zoom | 0);
    const sliceN = Math.max(2, Math.floor(n / zoom));
    const sliceStart = Math.floor((n - sliceN) / 2);
    const slice = bins.subarray(sliceStart, sliceStart + sliceN);

    // Spectrum row: live line.
    sctx.fillStyle = "#050505"; sctx.fillRect(0, 0, W, H);
    sctx.strokeStyle = "#151a1f"; sctx.lineWidth = 1;
    for (let k = 1; k < 10; k++) {
      const y = (H * k) / 10;
      sctx.beginPath(); sctx.moveTo(0, y); sctx.lineTo(W, y); sctx.stroke();
    }
    sctx.strokeStyle = "#ffb300"; sctx.lineWidth = 1.5; sctx.beginPath();
    for (let i = 0; i < sliceN; i++) {
      const x = (i / (sliceN - 1)) * W;
      const y = H - (slice[i] / 255) * H;
      if (i === 0) sctx.moveTo(x, y); else sctx.lineTo(x, y);
    }
    sctx.stroke();

    // Waterfall: scroll everything down by 1 row using the scratch canvas,
    // then paint the new row at y=0. Drawing in device-pixel space avoids
    // blurry resampling on HiDPI displays.
    const Wpx = wf.width, Hpx = wf.height;
    xctx.drawImage(wf, 0, 0);
    wctx.drawImage(scratch, 0, 1, Wpx, Hpx - 1);

    const img = wctx.createImageData(Wpx, 1);
    for (let x = 0; x < Wpx; x++) {
      const i = Math.floor((x / Wpx) * sliceN);
      const v = slice[i];
      const pi = v * 4;
      img.data[x*4+0] = palette[pi+0];
      img.data[x*4+1] = palette[pi+1];
      img.data[x*4+2] = palette[pi+2];
      img.data[x*4+3] = 255;
    }
    wctx.putImageData(img, 0, 0);

    // Header readouts — show the visible span, which is what the user cares
    // about with zoom on.
    tCenter.textContent = (centerHz / 1e6).toFixed(4);
    tSpan.textContent = ((sampleRate / zoom) / 1e3).toFixed(0);

    drawRadioMarker();
    drawRuler();
  }

  function updateFps() {
    state.frameCount++;
    const now = performance.now();
    const dt = now - state.fpsWindowAt;
    if (dt >= 1000) {
      tFps.textContent = ((state.frameCount * 1000) / dt).toFixed(1);
      state.frameCount = 0;
      state.fpsWindowAt = now;
    }
  }

  function connect() {
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    const url = `${proto}//${location.host}/api/ws/waterfall`;
    ws = new WebSocket(url);
    ws.binaryType = "arraybuffer";
    wsDot.className = "dot"; wsState.textContent = "connecting";

    ws.onopen = () => {
      wsDot.className = "dot ok";
      wsState.textContent = "live";
    };
    ws.onclose = () => {
      wsDot.className = "dot bad";
      wsState.textContent = "disconnected";
      empty.style.display = "flex";
      empty.textContent = "disconnected — retrying…";
      setTimeout(connect, 2000);
    };
    ws.onerror = () => { /* let onclose retry */ };
    ws.onmessage = (ev) => {
      if (typeof ev.data === "string") {
        try {
          const m = JSON.parse(ev.data);
          if (m.type === "sdr_header") {
            state.center_hz = m.center_hz;
            state.sample_rate = m.sample_rate;
            state.fft_size = m.fft_size;
            if (!tuneInput.value) {
              tuneInput.value = (m.center_hz / 1e6).toFixed(4);
            }
          }
        } catch {}
        return;
      }
      // Binary: 16-byte header + bins.
      const buf = ev.data;
      if (buf.byteLength < 16) return;
      const dv = new DataView(buf);
      const centerHz = Number(dv.getBigUint64(0, true));
      const sampleRate = dv.getUint32(8, true);
      const nBins = dv.getUint32(12, true);
      if (buf.byteLength < 16 + nBins) return;
      const bins = new Uint8Array(buf, 16, nBins);
      state.center_hz = centerHz;
      state.sample_rate = sampleRate;
      state.fft_size = nBins;
      empty.style.display = "none";
      drawFrame(bins, centerHz, sampleRate);
      updateFps();
    };
  }

  // Map an on-screen x coordinate within the spec/waterfall/ruler to a
  // visible-range frequency, snapped to the URC-200's 5 kHz grid.
  function xToHz(x, rect) {
    const v = visibleRange();
    if (!v) return null;
    const frac = Math.min(1, Math.max(0, (x - rect.left) / rect.width));
    const hz = v.low + v.span * frac;
    return Math.round(hz / 5000) * 5000;
  }

  // Tune the actual URC-200 (RX = TX = hz). Primary action on the waterfall
  // page — clicking the spectrum or pressing the Tune button hits this.
  async function tuneRadio(hz) {
    try {
      const res = await fetch("/api/command/tune", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ rx_hz: hz, tx_hz: hz }),
      });
      if (!res.ok) {
        const body = await res.text();
        console.warn("URC-200 tune failed", res.status, body);
      }
    } catch (e) {
      console.warn("URC-200 tune request error", e);
    }
  }

  // Recenter the SDR viewer. Leaves the URC-200 alone.
  function recenterSdr(hz) {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      console.warn("waterfall: ws not open; can't recenter SDR");
      return;
    }
    ws.send(JSON.stringify({ center_hz: hz }));
    state.center_hz = hz; // optimistic; confirmed by next frame header
    drawRuler();
  }

  function sendGain() {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const v = gainSel.value;
    if (v === "auto") {
      ws.send(JSON.stringify({ gain_mode: "auto" }));
    } else {
      ws.send(JSON.stringify({ gain_db: parseFloat(v) }));
    }
  }

  [spec, wf, ruler].forEach(el => {
    el.addEventListener("click", (e) => {
      const rect = el.getBoundingClientRect();
      const hz = xToHz(e.clientX, rect);
      if (hz == null) return;
      if (e.shiftKey) {
        // Shift-click = recenter SDR on that frequency.
        recenterSdr(hz);
      } else {
        // Plain click = tune the URC-200 there. Update the input so the
        // user sees what was sent and can tweak/re-fire.
        tuneInput.value = (hz / 1e6).toFixed(4);
        state.radio_rx_hz = hz; // optimistic marker; telemetry will confirm
        tuneRadio(hz);
      }
    });
    el.addEventListener("mousemove", (e) => {
      const v = visibleRange();
      if (!v) { cursor.style.display = "none"; cursorLabel.style.display = "none"; return; }
      const rect = el.getBoundingClientRect();
      const frac = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
      const hz = v.low + v.span * frac;
      cursor.style.display = "block";
      cursor.style.left = `${e.clientX}px`;
      cursorLabel.style.display = "block";
      cursorLabel.style.left = `${e.clientX + 6}px`;
      const band = BANDS.find(b => hz >= b.lo && hz < b.hi);
      cursorLabel.textContent = band
        ? `${formatHz(hz)} MHz · ${band.name}`
        : `${formatHz(hz)} MHz`;
    });
    el.addEventListener("mouseleave", () => {
      cursor.style.display = "none";
      cursorLabel.style.display = "none";
    });
  });

  function readTuneInputHz() {
    const raw = (tuneInput.value || "").trim();
    if (!raw) return null;
    const mhz = parseFloat(raw);
    if (isNaN(mhz) || mhz <= 0) {
      console.warn("waterfall: bad tune input", raw);
      return null;
    }
    return Math.round((mhz * 1e6) / 5000) * 5000; // 5 kHz snap
  }

  tuneBtn.addEventListener("click", () => {
    const hz = readTuneInputHz();
    if (hz == null) return;
    state.radio_rx_hz = hz;
    tuneRadio(hz);
  });
  tuneInput.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); tuneBtn.click(); } });

  document.getElementById("sdr-center-btn").addEventListener("click", () => {
    const hz = readTuneInputHz();
    if (hz != null) recenterSdr(hz);
  });
  document.getElementById("sdr-follow-btn").addEventListener("click", () => {
    if (state.radio_rx_hz > 0) recenterSdr(state.radio_rx_hz);
  });

  gainSel.addEventListener("change", sendGain);

  zoomSel.addEventListener("change", () => {
    state.zoom = Math.max(1, parseInt(zoomSel.value, 10) || 1);
    // Clear the waterfall history — old pixels are at a different x→Hz mapping
    // and would otherwise smear across the new zoom.
    wctx.fillStyle = "#000"; wctx.fillRect(0, 0, wf.width, wf.height);
    drawRuler();
  });

  // Telemetry subscription — we only watch `preset` events so we can draw
  // the URC-200 tuned-frequency marker at the right spot.
  function connectTelemetry() {
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    telWs = new WebSocket(`${proto}//${location.host}/api/ws/telemetry`);
    telWs.onmessage = (ev) => {
      try {
        const m = JSON.parse(ev.data);
        if (m.type === "preset") {
          state.radio_rx_hz = Math.round(m.rx_mhz * 1e6);
          if (!tuneInput.value) {
            tuneInput.value = m.rx_mhz.toFixed(4);
          }
        }
      } catch {}
    };
    telWs.onclose = () => setTimeout(connectTelemetry, 2000);
    telWs.onerror = () => { /* onclose will retry */ };
  }

  resize();
  connect();
  connectTelemetry();
})();
</script>
</body>
</html>
